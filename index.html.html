<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoFast – Delivery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --orange:#FF5C00;--orange-light:#FF8040;--dark:#0F0F0F;--surface:#1A1A1A;
    --surface2:#242424;--surface3:#2E2E2E;--border:#333;--text:#F0EDE6;
    --muted:#888;--green:#22C55E;--red:#EF4444;--blue:#3B82F6;
  }
  body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--orange);letter-spacing:-0.5px}
  .logo span{color:var(--text)}
  .header-tabs{display:flex;gap:4px}
  .tab-btn{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
  .tab-btn.active{background:var(--orange);color:#fff}
  .tab-btn:hover:not(.active){background:var(--surface2);color:var(--text)}
  .view{display:none;padding:20px;max-width:800px;margin:0 auto}
  .view.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
  .card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:16px;color:var(--text)}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px;margin-top:14px}
  label:first-child{margin-top:0}
  input,textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  input:focus,textarea:focus,select:focus{border-color:var(--orange)}
  select option{background:var(--surface2)}
  textarea{resize:vertical;min-height:80px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-primary:hover{background:var(--orange-light)}
  .btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:var(--muted)}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}
  .btn-success{background:#16a34a;color:#fff}
  .btn-danger{background:#dc2626;color:#fff}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
  .badge-pending{background:#78350f;color:#fcd34d}
  .badge-confirmed{background:#14532d;color:#86efac}
  .badge-collecting{background:#1e3a5f;color:#93c5fd}
  .badge-delivering{background:#4c1d95;color:#c4b5fd}
  .badge-done{background:#14532d;color:#86efac}
  .badge-cancelled{background:#3f0000;color:#fca5a5}
  .order-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
  .order-item:hover{border-color:var(--orange)}
  .order-item.selected{border-color:var(--orange);background:var(--surface3)}
  .order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .order-client{font-weight:600;font-size:14px}
  .order-route{font-size:12px;color:var(--muted);margin-top:4px}
  .order-time{font-size:11px;color:var(--muted);margin-top:6px}
  .chat-container{height:320px;overflow-y:auto;background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:75%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5}
  .msg.client{background:var(--surface3);color:var(--text);align-self:flex-start;border-bottom-left-radius:3px}
  .msg.motoboy{background:var(--orange);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
  .msg-meta{font-size:10px;opacity:.6;margin-top:3px}
  .chat-input-row{display:flex;gap:8px}
  .chat-input-row input{flex:1}
  .timeline{display:flex;gap:0;margin:16px 0}
  .step{flex:1;text-align:center;position:relative}
  .step::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
  .step:last-child::after{display:none}
  .step-dot{width:24px;height:24px;border-radius:50%;background:var(--surface3);border:2px solid var(--border);margin:0 auto 6px;position:relative;z-index:1;display:flex;align-items:center;justify-content:center;font-size:10px}
  .step.done .step-dot{background:var(--green);border-color:var(--green)}
  .step.active .step-dot{background:var(--orange);border-color:var(--orange);box-shadow:0 0 0 4px rgba(255,92,0,.2)}
  .step-label{font-size:11px;color:var(--muted)}
  .step.done .step-label,.step.active .step-label{color:var(--text)}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:600px){.two-col{grid-template-columns:1fr}}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
  .stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--orange)}
  .stat-label{font-size:12px;color:var(--muted);margin-top:2px}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
  .empty-icon{font-size:32px;margin-bottom:8px}
  .notif{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;margin-left:4px;vertical-align:middle}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
  #toast.show{opacity:1}
  .divider{border:none;border-top:1px solid var(--border);margin:16px 0}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Moto<span>Fast</span></div>
  <div class="header-tabs">
    <button class="tab-btn active" onclick="switchView('client',this)">📦 Cliente</button>
    <button class="tab-btn" id="admin-tab" onclick="switchView('admin',this)">🏍️ Admin <span class="notif" id="notif-dot" style="display:none"></span></button>
  </div>
</div>

<!-- CLIENTE -->
<div class="view active" id="view-client">
  <div id="client-form-section">
    <div class="card">
      <div class="card-title">📍 Solicitar Nova Entrega</div>
      <label>Seu nome *</label>
      <input type="text" id="cli-name" placeholder="Ex: João Silva">
      <label>Seu WhatsApp *</label>
      <input type="text" id="cli-phone" placeholder="(11) 99999-9999">
      <div class="two-col">
        <div>
          <label>Local de retirada *</label>
          <input type="text" id="cli-pickup" placeholder="Rua, número, bairro">
        </div>
        <div>
          <label>Local de entrega *</label>
          <input type="text" id="cli-dropoff" placeholder="Rua, número, bairro">
        </div>
      </div>
      <label>Data e horário desejado *</label>
      <input type="datetime-local" id="cli-time">
      <label>Observações</label>
      <textarea id="cli-obs" placeholder="Tipo de produto, peso, urgência, instruções especiais..."></textarea>
      <div style="margin-top:16px">
        <button class="btn btn-primary" onclick="submitOrder()" style="width:100%;justify-content:center">
          🚀 Solicitar Entrega
        </button>
      </div>
    </div>
    <div id="my-orders-section" style="display:none">
      <div class="card">
        <div class="card-title">📋 Meus Pedidos Recentes</div>
        <div id="my-orders-list"></div>
      </div>
    </div>
  </div>

  <!-- RASTREAMENTO -->
  <div id="tracking-panel" style="display:none">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="card-title" style="margin:0">🔍 Acompanhar Pedido</div>
        <button class="btn btn-ghost btn-sm" onclick="showClientForm()">← Voltar</button>
      </div>
      <div id="track-info"></div>
      <hr class="divider">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">💬 Chat com o Motoboy</div>
      <div class="chat-container" id="client-chat"></div>
      <div class="chat-input-row">
        <input type="text" id="client-msg-input" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter')sendMsg('client')">
        <button class="btn btn-primary btn-sm" onclick="sendMsg('client')">Enviar</button>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="view" id="view-admin">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">Pendentes</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Concluídos</div></div>
  </div>

  <div id="admin-no-orders" class="empty" style="display:none">
    <div class="empty-icon">🏍️</div>
    <div>Nenhum pedido ainda</div>
    <div style="font-size:12px;margin-top:8px">Quando clientes solicitarem entregas, aparecerão aqui</div>
  </div>

  <div id="orders-list"></div>

  <div id="admin-detail" style="display:none">
    <div class="card" style="border-color:var(--orange)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="card-title" style="margin:0">📋 Detalhes do Pedido</div>
        <button class="btn btn-ghost btn-sm" onclick="closeDetail()">✕ Fechar</button>
      </div>
      <div id="detail-content"></div>
      <hr class="divider">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">💬 Chat com Cliente</div>
      <div class="chat-container" id="admin-chat"></div>
      <div class="chat-input-row">
        <input type="text" id="admin-msg-input" placeholder="Responder cliente..." onkeydown="if(event.key==='Enter')sendMsg('admin')">
        <button class="btn btn-primary btn-sm" onclick="sendMsg('admin')">Enviar</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// ESTADO GLOBAL
// ============================================================
let orders = JSON.parse(localStorage.getItem('motoboy_orders') || '[]');
let selectedOrderId = null;
let currentClientOrderId = localStorage.getItem('motoboy_current') || null;
let refreshInterval = null;

function save() {
  localStorage.setItem('motoboy_orders', JSON.stringify(orders));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function now() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function formatDT(dt) {
  if (!dt) return '-';
  try {
    return new Date(dt).toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', year: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  } catch (e) { return dt; }
}

function statusLabel(s) {
  const map = {
    pending: '⏳ Pendente',
    confirmed: '✅ Confirmado',
    collecting: '📦 Coletando',
    delivering: '🏍️ Entregando',
    done: '🎉 Concluído',
    cancelled: '❌ Cancelado'
  };
  return map[s] || s;
}

// ============================================================
// NAVEGAÇÃO
// ============================================================
function switchView(v, btn) {
  document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  if (btn) btn.classList.add('active');
  if (v === 'admin') {
    renderAdmin();
    document.getElementById('notif-dot').style.display = 'none';
  }
  if (v === 'client') {
    renderClientOrders();
  }
}

// ============================================================
// CLIENTE – CRIAR PEDIDO
// ============================================================
function submitOrder() {
  const name    = document.getElementById('cli-name').value.trim();
  const phone   = document.getElementById('cli-phone').value.trim();
  const pickup  = document.getElementById('cli-pickup').value.trim();
  const dropoff = document.getElementById('cli-dropoff').value.trim();
  const time    = document.getElementById('cli-time').value;
  const obs     = document.getElementById('cli-obs').value.trim();

  if (!name || !phone || !pickup || !dropoff || !time) {
    toast('⚠️ Preencha todos os campos obrigatórios');
    return;
  }

  const order = {
    id: Date.now().toString(),
    name, phone, pickup, dropoff, time, obs,
    status: 'pending',
    createdAt: new Date().toLocaleString('pt-BR'),
    chat: [{ from: 'system', text: 'Pedido criado! Aguardando confirmação do motoboy.', ts: now() }]
  };

  orders.unshift(order);
  save();

  currentClientOrderId = order.id;
  localStorage.setItem('motoboy_current', order.id);

  document.getElementById('notif-dot').style.display = 'inline-block';
  toast('✅ Pedido enviado! Aguarde a confirmação.');
  selectedOrderId = order.id;
  openTracking(order.id);
}

// ============================================================
// CLIENTE – RASTREAMENTO
// ============================================================
function openTracking(id) {
  selectedOrderId = id;
  document.getElementById('client-form-section').style.display = 'none';
  document.getElementById('tracking-panel').style.display = 'block';
  renderTracking(id);

  clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    orders = JSON.parse(localStorage.getItem('motoboy_orders') || '[]');
    renderTracking(id);
  }, 1500);
}

function showClientForm() {
  clearInterval(refreshInterval);
  document.getElementById('tracking-panel').style.display = 'none';
  document.getElementById('client-form-section').style.display = 'block';
  renderClientOrders();
}

function renderTracking(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;

  const steps   = ['pending', 'confirmed', 'collecting', 'delivering', 'done'];
  const labels  = ['Pendente', 'Confirmado', 'Coletando', 'Entregando', 'Concluído'];
  const icons   = ['⏳', '✅', '📦', '🏍️', '🎉'];
  const si = steps.indexOf(o.status);

  const stepsHtml = steps.map((s, i) => `
    <div class="step ${i < si ? 'done' : i === si ? 'active' : ''}">
      <div class="step-dot">${icons[i]}</div>
      <div class="step-label">${labels[i]}</div>
    </div>
  `).join('');

  document.getElementById('track-info').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="font-size:18px;font-weight:700;font-family:'Syne',sans-serif">${o.name}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${o.phone} · Solicitado ${o.createdAt}</div>
    </div>
    <div style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:14px;font-size:13px">
      <div><span style="color:var(--muted)">📍 Retirada:</span> ${o.pickup}</div>
      <div style="margin-top:4px"><span style="color:var(--muted)">📬 Entrega:</span> ${o.dropoff}</div>
      <div style="margin-top:4px"><span style="color:var(--muted)">🕐 Horário:</span> ${formatDT(o.time)}</div>
      ${o.obs ? `<div style="margin-top:4px"><span style="color:var(--muted)">📝 Obs:</span> ${o.obs}</div>` : ''}
    </div>
    <div class="timeline">${stepsHtml}</div>
  `;

  renderChat('client', id);
}

function renderClientOrders() {
  const myOrder = orders.find(o => o.id === currentClientOrderId);
  const section = document.getElementById('my-orders-section');
  if (!myOrder) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  document.getElementById('my-orders-list').innerHTML = `
    <div class="order-item" onclick="openTracking('${myOrder.id}')">
      <div class="order-header">
        <span class="order-client">${myOrder.name}</span>
        <span class="badge badge-${myOrder.status}">${statusLabel(myOrder.status)}</span>
      </div>
      <div class="order-route">📍 ${myOrder.pickup} → 📬 ${myOrder.dropoff}</div>
      <div class="order-time">🕐 ${formatDT(myOrder.time)}</div>
    </div>
  `;
}

// ============================================================
// ADMIN – LISTA DE PEDIDOS
// ============================================================
function renderAdmin() {
  orders = JSON.parse(localStorage.getItem('motoboy_orders') || '[]');
  const pending = orders.filter(o => o.status === 'pending').length;
  const done    = orders.filter(o => o.status === 'done').length;
  document.getElementById('stat-total').textContent   = orders.length;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-done').textContent    = done;

  const list = document.getElementById('orders-list');
  if (!orders.length) {
    document.getElementById('admin-no-orders').style.display = 'block';
    list.innerHTML = '';
    return;
  }
  document.getElementById('admin-no-orders').style.display = 'none';

  list.innerHTML = orders.map(o => `
    <div class="order-item ${selectedOrderId === o.id ? 'selected' : ''}" onclick="selectOrder('${o.id}')">
      <div class="order-header">
        <span class="order-client">${o.name} <span style="font-size:12px;color:var(--muted)">${o.phone}</span></span>
        <span class="badge badge-${o.status}">${statusLabel(o.status)}</span>
      </div>
      <div class="order-route">📍 ${o.pickup}</div>
      <div class="order-route" style="margin-top:2px">📬 ${o.dropoff}</div>
      <div class="order-time">🕐 ${formatDT(o.time)} · Criado: ${o.createdAt}</div>
    </div>
  `).join('');
}

// ============================================================
// ADMIN – DETALHE E AÇÕES
// ============================================================
function selectOrder(id) {
  selectedOrderId = id;
  renderAdmin();

  const o = orders.find(x => x.id === id);
  if (!o) return;

  document.getElementById('admin-detail').style.display = 'block';
  document.getElementById('admin-detail').scrollIntoView({ behavior: 'smooth' });

  const nextMap = { pending: 'confirmed', confirmed: 'collecting', collecting: 'delivering', delivering: 'done' };
  const nextLabelMap = {
    pending:   '✅ Confirmar Pedido',
    confirmed: '📦 Iniciar Coleta',
    collecting:'🏍️ Saiu para Entrega',
    delivering:'🎉 Marcar como Concluído'
  };

  const nextBtn = nextMap[o.status]
    ? `<button class="btn btn-success btn-sm" onclick="advanceStatus('${o.id}')">${nextLabelMap[o.status]}</button>`
    : `<span style="color:var(--green);font-size:13px">✔️ Pedido Concluído</span>`;

  const cancelBtn = (o.status !== 'cancelled' && o.status !== 'done')
    ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder('${o.id}')">❌ Cancelar</button>`
    : '';

  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
      <div>
        <div style="font-size:16px;font-weight:700;font-family:'Syne',sans-serif">${o.name}</div>
        <div style="font-size:12px;color:var(--muted)">${o.phone}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <span class="badge badge-${o.status}">${statusLabel(o.status)}</span>
        ${nextBtn}
        ${cancelBtn}
      </div>
    </div>
    <div style="font-size:13px;display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--surface2);border-radius:8px;padding:12px">
      <div><div style="color:var(--muted);font-size:11px;margin-bottom:3px">📍 RETIRADA</div>${o.pickup}</div>
      <div><div style="color:var(--muted);font-size:11px;margin-bottom:3px">📬 ENTREGA</div>${o.dropoff}</div>
      <div><div style="color:var(--muted);font-size:11px;margin-bottom:3px">🕐 HORÁRIO</div>${formatDT(o.time)}</div>
      ${o.obs ? `<div><div style="color:var(--muted);font-size:11px;margin-bottom:3px">📝 OBS</div>${o.obs}</div>` : ''}
    </div>
  `;

  renderChat('admin', id);
}

function advanceStatus(id) {
  orders = JSON.parse(localStorage.getItem('motoboy_orders') || '[]');
  const o = orders.find(x => x.id === id);
  if (!o) return;

  const next = { pending: 'confirmed', confirmed: 'collecting', collecting: 'delivering', delivering: 'done' };
  const autoMsg = {
    confirmed:  '✅ Pedido confirmado! Estarei a caminho em breve.',
    collecting: '📦 Estou indo buscar o produto agora!',
    delivering: '🏍️ Produto coletado! Já estou indo até o endereço de entrega.',
    done:       '🎉 Entrega concluída com sucesso! Obrigado pela preferência!'
  };

  if (next[o.status]) {
    o.status = next[o.status];
    if (autoMsg[o.status]) {
      o.chat.push({ from: 'motoboy', text: autoMsg[o.status], ts: now() });
    }
    save();
    selectOrder(id);
    renderAdmin();
    toast('✅ Status atualizado!');
  }
}

function cancelOrder(id) {
  orders = JSON.parse(localStorage.getItem('motoboy_orders') || '[]');
  const o = orders.find(x => x.id === id);
  if (!o) return;
  o.status = 'cancelled';
  o.chat.push({ from: 'motoboy', text: '❌ Infelizmente tivemos que cancelar o pedido. Entre em contato para mais informações.', ts: now() });
  save();
  selectOrder(id);
  renderAdmin();
  toast('Pedido cancelado');
}

function closeDetail() {
  document.getElementById('admin-detail').style.display = 'none';
  selectedOrderId = null;
  renderAdmin();
}

// ============================================================
// CHAT
// ============================================================
function renderChat(who, id) {
  orders = JSON.parse(localStorage.getItem('motoboy_orders') || '[]');
  const o = orders.find(x => x.id === id);
  if (!o) return;

  const containerId = who === 'client' ? 'client-chat' : 'admin-chat';
  const container = document.getElementById(containerId);
  if (!container) return;

  container.innerHTML = (o.chat || []).map(m => {
    if (m.from === 'system') {
      return `<div style="text-align:center;font-size:11px;color:var(--muted);padding:4px 0">${m.text}</div>`;
    }
    const cls   = m.from === 'motoboy' ? 'motoboy' : 'client';
    const label = m.from === 'motoboy' ? '🏍️ Motoboy' : '👤 Cliente';
    return `<div class="msg ${cls}"><div>${m.text}</div><div class="msg-meta">${label} · ${m.ts}</div></div>`;
  }).join('');

  container.scrollTop = container.scrollHeight;
}

function sendMsg(who) {
  const inputId = who === 'client' ? 'client-msg-input' : 'admin-msg-input';
  const input   = document.getElementById(inputId);
  const text    = input.value.trim();
  if (!text || !selectedOrderId) return;

  orders = JSON.parse(localStorage.getItem('motoboy_orders') || '[]');
  const o = orders.find(x => x.id === selectedOrderId);
  if (!o) return;

  o.chat.push({ from: who === 'client' ? 'client' : 'motoboy', text, ts: now() });
  save();
  input.value = '';
  renderChat(who, selectedOrderId);

  if (who === 'client') {
    document.getElementById('notif-dot').style.display = 'inline-block';
  }
}

// ============================================================
// INIT
// ============================================================
document.getElementById('cli-time').value = new Date(Date.now() + 3600000).toISOString().slice(0, 16);

if (currentClientOrderId && orders.find(x => x.id === currentClientOrderId)) {
  renderClientOrders();
}

if (orders.filter(o => o.status === 'pending').length > 0) {
  document.getElementById('notif-dot').style.display = 'inline-block';
}
</script>
